# GraalVM Native Image configuration for the todo-read Lambda.
#
# Activates:
#   - TodoReadFeature: registers the Lambda handler, ApplicationFactory,
#     and AWS events POJOs for reflection
#   - EnkanFeature (from kotowari-graalvm): generates reflection-free
#     ComponentBinder classes for any SystemComponent referenced via the
#     enkan.component.classes system property
#
# --initialize-at-build-time lists are kept minimal — most Enkan classes
# are safe to initialize at runtime. If build fails with a "classes
# initialized at build time" error, add the offending class here.
Args = \
    --features=enkan.example.faas.read.graalvm.TodoReadFeature \
    --initialize-at-build-time=org.slf4j,org.slf4j.helpers,org.slf4j.simple \
    --enable-url-protocols=https \
    -H:+ReportExceptionStackTraces
