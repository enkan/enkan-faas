AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  enkan-faas TODO API — GraalVM native binary variant.
  Uses provided.al2023 custom runtime; cold start ~80-200 ms.
  Must be built on Linux arm64 (or via Docker) — see Makefile comments.

Globals:
  Function:
    Runtime: provided.al2023
    Architectures: [arm64]
    Timeout: 10

Resources:

  TodoReadFunctionNative:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: enkan-todo-read-native
      CodeUri: ../../
      Handler: enkan.example.faas.read.generated.TodoReadHandler::handleRequest
      MemorySize: 256
      Description: Read-only TODO endpoints — native binary
      Events:
        GetAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref TodoApi
            Path: /todos
            Method: GET
        GetOne:
          Type: HttpApi
          Properties:
            ApiId: !Ref TodoApi
            Path: /todos/{id}
            Method: GET

  TodoWriteFunctionNative:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: enkan-todo-write-native
      CodeUri: ../../
      Handler: enkan.example.faas.write.generated.TodoWriteHandler::handleRequest
      MemorySize: 384
      Description: Mutating TODO endpoints — native binary
      Events:
        Create:
          Type: HttpApi
          Properties:
            ApiId: !Ref TodoApi
            Path: /todos
            Method: POST
        Update:
          Type: HttpApi
          Properties:
            ApiId: !Ref TodoApi
            Path: /todos/{id}
            Method: PUT
        Delete:
          Type: HttpApi
          Properties:
            ApiId: !Ref TodoApi
            Path: /todos/{id}
            Method: DELETE

  TodoApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod

Outputs:
  ApiUrl:
    Description: Public HTTPS URL of the TODO HTTP API (native)
    Value: !Sub 'https://${TodoApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
